<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerador de Carrosséis — ePeritos</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary:   #3B2E5A;
      --secondary: #3ED1A3;
      --bg-slide:  #2E2547;
      --bg-app:    #18112E;
      --text:      #F1EEF9;
      --muted:     rgba(241,238,249,0.50);
      --border:    rgba(255,255,255,0.08);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-app);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ──────────────────────────────── */
    header {
      background: var(--primary);
      padding: 16px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .logo {
      font-family: 'Poppins', sans-serif;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .logo span { color: var(--secondary); }
    .header-badge {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      background: rgba(255,255,255,0.06);
      padding: 4px 12px;
      border-radius: 20px;
    }

    /* ── LAYOUT ──────────────────────────────── */
    .container {
      max-width: 1160px;
      margin: 0 auto;
      padding: 36px 24px;
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 36px;
      align-items: start;
    }

    /* ── FORM PANEL ──────────────────────────── */
    .panel {
      background: rgba(255,255,255,0.025);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
    }
    .panel-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--secondary);
      margin-bottom: 24px;
    }
    .form-group { margin-bottom: 18px; }
    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 7px;
      letter-spacing: 0.2px;
    }
    input, textarea, select {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 11px 14px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }
    input:focus, textarea:focus, select:focus {
      border-color: var(--secondary);
      background: rgba(62,209,163,0.04);
    }
    input::placeholder, textarea::placeholder { color: rgba(241,238,249,0.25); }
    textarea { resize: vertical; min-height: 76px; line-height: 1.5; }
    select option { background: var(--primary); }
    .key-wrap { position: relative; }
    .key-wrap input { padding-right: 40px; font-family: monospace; font-size: 13px; }
    .eye-btn {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: 15px; line-height: 1; padding: 4px;
    }
    .hint {
      font-size: 11px; color: var(--muted); margin-top: 5px; line-height: 1.5;
    }
    .hint a { color: var(--secondary); text-decoration: none; }

    .btn-main {
      width: 100%; padding: 13px;
      background: var(--secondary);
      color: var(--bg-slide);
      border: none; border-radius: 9px;
      font-family: 'Poppins', sans-serif;
      font-size: 14px; font-weight: 700;
      cursor: pointer; letter-spacing: 0.3px;
      transition: opacity 0.2s, transform 0.1s;
      margin-top: 4px;
    }
    .btn-main:hover { opacity: 0.88; }
    .btn-main:active { transform: scale(0.98); }
    .btn-main:disabled { opacity: 0.45; cursor: not-allowed; }

    .status-box {
      display: none; margin-top: 14px;
      padding: 11px 14px; border-radius: 8px;
      font-size: 13px; line-height: 1.5;
    }
    .status-box.show { display: block; }
    .status-box.info  { background: rgba(62,209,163,0.08); color: var(--secondary); border: 1px solid rgba(62,209,163,0.18); }
    .status-box.error { background: rgba(239,68,68,0.08);  color: #f87171;           border: 1px solid rgba(239,68,68,0.18); }

    /* ── PREVIEW PANEL ───────────────────────── */
    .preview-panel { min-height: 500px; }
    .preview-top {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 20px;
    }
    .preview-label {
      font-size: 10px; font-weight: 700;
      letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted);
    }
    .export-btns { display: flex; gap: 8px; }
    .btn-sm {
      padding: 7px 15px; border-radius: 8px;
      font-size: 12px; font-weight: 600;
      cursor: pointer; border: 1px solid var(--border);
      background: transparent; color: var(--text);
      transition: all 0.2s; white-space: nowrap;
    }
    .btn-sm:hover { background: rgba(255,255,255,0.06); }
    .btn-sm.accent {
      background: var(--secondary); color: var(--bg-slide);
      border-color: var(--secondary);
    }
    .btn-sm.accent:hover { opacity: 0.85; }
    .btn-sm:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── EMPTY STATE ─────────────────────────── */
    .empty-state {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 500px; color: var(--muted); text-align: center; gap: 10px;
    }
    .empty-state svg { opacity: 0.2; }
    .empty-state p { font-size: 14px; line-height: 1.6; }

    /* ── SLIDE VIEWER ────────────────────────── */
    #slidesWrapper { display: none; }

    .slide-outer {
      width: 540px; height: 540px;
      position: relative; overflow: hidden;
      border-radius: 3px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.5);
      margin: 0 auto;
    }

    /* ─── SLIDES BASE ──── */
    .slide {
      position: absolute; inset: 0;
      width: 540px; height: 540px;
      background: var(--bg-slide);
      font-family: 'Inter', sans-serif;
      overflow: hidden;
      display: none;
      flex-direction: column;
    }
    .slide.active { display: flex; }

    /* brand mark */
    .s-brand {
      position: absolute; top: 22px; right: 26px;
      font-family: 'Poppins', sans-serif;
      font-size: 13px; font-weight: 800;
      color: var(--secondary); letter-spacing: 0.3px;
      z-index: 10;
    }
    /* ghost number */
    .s-ghost {
      position: absolute;
      font-family: 'Poppins', sans-serif;
      font-weight: 900; line-height: 1;
      color: rgba(255,255,255,0.04);
      user-select: none; z-index: 0;
      pointer-events: none;
    }

    /* ─── COVER SLIDE ──── */
    .slide-cover { justify-content: flex-end; }
    .cover-inner {
      position: relative; z-index: 1;
      padding: 36px 40px 60px 40px;
    }
    .cover-tag {
      font-size: 10px; font-weight: 700;
      letter-spacing: 2.5px; text-transform: uppercase;
      color: var(--secondary); margin-bottom: 14px;
    }
    .cover-title {
      font-family: 'Poppins', sans-serif;
      font-size: 36px; font-weight: 800;
      line-height: 1.1; color: #fff;
      letter-spacing: -1px; margin-bottom: 14px;
    }
    .cover-sub {
      font-size: 14px; color: var(--muted);
      line-height: 1.55; max-width: 88%;
    }
    .cover-handle {
      position: absolute; bottom: 22px; left: 40px;
      font-size: 12px; font-weight: 500;
      color: rgba(255,255,255,0.28);
    }
    /* accent bar on cover */
    .cover-bar {
      position: absolute; left: 0; top: 0; bottom: 0;
      width: 4px; background: var(--secondary);
    }

    /* ─── CONTENT SLIDE ──── */
    .slide-content { justify-content: center; padding: 38px 42px; }
    .content-counter {
      font-size: 10px; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase;
      color: var(--secondary); margin-bottom: 18px;
    }
    .content-title {
      font-family: 'Poppins', sans-serif;
      font-size: 26px; font-weight: 700;
      line-height: 1.2; color: #fff;
      letter-spacing: -0.5px; margin-bottom: 18px;
    }
    .content-body {
      font-size: 14px; line-height: 1.75;
      color: var(--muted); max-width: 92%;
    }
    .content-highlight {
      display: inline-block; margin-top: 18px;
      padding: 9px 14px;
      background: rgba(62,209,163,0.07);
      border-left: 3px solid var(--secondary);
      border-radius: 0 6px 6px 0;
      font-size: 13px; color: var(--secondary);
      font-weight: 500; line-height: 1.45;
      max-width: 92%;
    }

    /* ─── CTA SLIDE ──── */
    .slide-cta { justify-content: center; padding: 38px 42px; }
    .cta-tag {
      font-size: 10px; font-weight: 700;
      letter-spacing: 2.5px; text-transform: uppercase;
      color: var(--secondary); margin-bottom: 18px;
    }
    .cta-line {
      width: 44px; height: 3px;
      background: var(--secondary); margin-bottom: 22px;
    }
    .cta-main {
      font-family: 'Poppins', sans-serif;
      font-size: 30px; font-weight: 800;
      line-height: 1.15; color: #fff;
      letter-spacing: -0.5px; margin-bottom: 18px;
    }
    .cta-main .kw { color: var(--secondary); }
    .cta-secondary {
      font-size: 14px; color: var(--muted); line-height: 1.55;
    }
    .slide-hashtags {
      position: absolute; bottom: 20px; left: 42px; right: 42px;
      font-size: 10px; color: rgba(255,255,255,0.18);
      line-height: 1.7;
    }

    /* ── NAVIGATION ──────────────────────────── */
    .slide-nav {
      display: flex; align-items: center;
      justify-content: center; gap: 14px;
      margin-top: 18px;
    }
    .nav-btn {
      width: 34px; height: 34px; border-radius: 50%;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      color: var(--text); font-size: 18px;
      cursor: pointer; display: flex;
      align-items: center; justify-content: center;
      transition: background 0.2s;
      line-height: 1;
    }
    .nav-btn:hover { background: rgba(255,255,255,0.10); }
    .nav-btn:disabled { opacity: 0.25; cursor: default; }
    .dots { display: flex; gap: 5px; }
    .dot {
      width: 6px; height: 6px; border-radius: 3px;
      background: rgba(255,255,255,0.18);
      cursor: pointer; transition: all 0.2s;
    }
    .dot.active { background: var(--secondary); width: 18px; }
    .slide-count {
      font-size: 12px; color: var(--muted);
      min-width: 44px; text-align: center;
    }

    /* ── HASHTAG BAR ─────────────────────────── */
    .hash-bar {
      display: none; margin-top: 16px;
      padding: 13px 18px;
      background: rgba(255,255,255,0.025);
      border: 1px solid var(--border);
      border-radius: 10px;
      align-items: center; gap: 12px;
    }
    .hash-bar.show { display: flex; }
    .hash-text {
      font-size: 12px; color: var(--secondary);
      flex: 1; line-height: 1.6;
    }

    /* ── LOADING ─────────────────────────────── */
    .loader {
      position: absolute; inset: 0;
      background: rgba(46,37,71,0.88);
      display: none; align-items: center;
      justify-content: center; z-index: 50;
      flex-direction: column; gap: 14px;
    }
    .loader.show { display: flex; }
    .spinner {
      width: 34px; height: 34px;
      border: 3px solid rgba(62,209,163,0.18);
      border-top-color: var(--secondary);
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
    }
    .loader-text { font-size: 12px; color: var(--muted); }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── RESPONSIVE ──────────────────────────── */
    @media (max-width: 960px) {
      .container { grid-template-columns: 1fr; }
      .slide-outer { max-width: 100%; }
    }
    @media (max-width: 580px) {
      header { padding: 14px 20px; }
      .container { padding: 20px 16px; }
      .panel { padding: 20px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">e<span>Peritos</span> <span style="opacity:.35; font-weight:400; font-size:16px">·</span> gerador de carrosséis</div>
  <span class="header-badge">Claude Code</span>
</header>

<div class="container">

  <!-- ═══ FORM ═══ -->
  <aside class="panel">
    <p class="panel-label">configuração</p>

    <div class="form-group">
      <label>chave de API — Anthropic</label>
      <div class="key-wrap">
        <input type="password" id="apiKey" placeholder="sk-ant-api03-..." autocomplete="off">
        <button class="eye-btn" onclick="toggleKey()" title="mostrar/ocultar">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <p class="hint">obtenha grátis em <a href="#" onclick="return false">console.anthropic.com</a> — salva só no seu navegador</p>
    </div>

    <div class="form-group">
      <label>tema do carrossel</label>
      <textarea id="tema" rows="3" placeholder="ex: como abrir MEI como engenheiro perito&#10;ex: 5 erros no laudo técnico que custam caro&#10;ex: o que é ART e quando é obrigatória"></textarea>
    </div>

    <div class="form-group">
      <label>palavra-chave do CTA</label>
      <input type="text" id="ctaKw" value="GUIA" placeholder="ex: GUIA, LAUDO, MEI, PERITO">
      <p class="hint">o seguidor comenta essa palavra para receber o material</p>
    </div>

    <div class="form-group">
      <label>quantidade de slides</label>
      <select id="numSlides">
        <option value="5">5 slides</option>
        <option value="7" selected>7 slides (recomendado)</option>
        <option value="9">9 slides</option>
        <option value="10">10 slides</option>
      </select>
    </div>

    <button class="btn-main" id="btnGerar" onclick="gerar()">→ gerar carrossel</button>

    <div class="status-box" id="statusBox"></div>
  </aside>

  <!-- ═══ PREVIEW ═══ -->
  <main class="preview-panel">
    <div class="preview-top">
      <span class="preview-label">preview · 1080 × 1080 px</span>
      <div class="export-btns" id="exportBtns" style="display:none">
        <button class="btn-sm" onclick="dlSlide()">↓ este slide</button>
        <button class="btn-sm accent" id="btnDlAll" onclick="dlAll()">↓ exportar todos</button>
      </div>
    </div>

    <!-- empty -->
    <div class="empty-state" id="emptyState">
      <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
        <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/>
      </svg>
      <p>preencha o tema e gere<br>seu carrossel</p>
    </div>

    <!-- slides -->
    <div id="slidesWrapper">
      <div class="slide-outer" id="slideOuter">
        <div id="slidesCont"></div>
        <div class="loader" id="loader">
          <div class="spinner"></div>
          <span class="loader-text">gerando com Claude...</span>
        </div>
      </div>

      <div class="slide-nav">
        <button class="nav-btn" id="btnPrev" onclick="nav(-1)">‹</button>
        <div class="dots" id="dots"></div>
        <button class="nav-btn" id="btnNext" onclick="nav(1)">›</button>
      </div>
      <div class="slide-count" id="slideCount" style="text-align:center;margin-top:6px"></div>
    </div>

    <div class="hash-bar" id="hashBar">
      <span class="hash-text" id="hashText"></span>
      <button class="btn-sm accent" onclick="copyHash(this)">copiar</button>
    </div>
  </main>

</div>

<script>
  /* ── state ── */
  let cur = 0, total = 0;

  /* ── utils ── */
  function toggleKey() {
    const el = document.getElementById('apiKey');
    el.type = el.type === 'password' ? 'text' : 'password';
  }

  function setStatus(msg, type) {
    const b = document.getElementById('statusBox');
    b.textContent = msg;
    b.className = `status-box show ${type}`;
  }
  function clearStatus() { document.getElementById('statusBox').className = 'status-box'; }

  /* ── generate ── */
  async function gerar() {
    const apiKey  = document.getElementById('apiKey').value.trim();
    const tema    = document.getElementById('tema').value.trim();
    const ctaKw   = (document.getElementById('ctaKw').value.trim() || 'GUIA').toUpperCase();
    const num     = parseInt(document.getElementById('numSlides').value);

    if (!apiKey) { setStatus('insira sua chave de API do Anthropic', 'error'); return; }
    if (!tema)   { setStatus('descreva o tema do carrossel', 'error'); return; }

    const btn = document.getElementById('btnGerar');
    btn.disabled = true; btn.textContent = '⟳ gerando...';
    setStatus('chamando Claude... aguarde alguns segundos', 'info');

    document.getElementById('emptyState').style.display = 'none';
    document.getElementById('slidesWrapper').style.display = 'block';
    document.getElementById('loader').classList.add('show');

    const numContent = num - 2;

    const system = `Você é criador de conteúdo para o perfil @eperitosaas no Instagram.
Nicho: perícias — laudos, engenharia diagnóstica, ARTs, MEI para engenheiros e arquitetos.
Público: engenheiros e arquitetos empreendedores, peritos, MEIs.
Tom: acessível, direto, prático — tudo em lowercase exceto siglas e a PALAVRA do CTA.
Nunca use emojis como elemento principal. Nada de clichê motivacional.
Retorne SOMENTE JSON válido, sem markdown, sem texto antes ou depois.`;

    const prompt = `Crie conteúdo para um carrossel de ${num} slides sobre: "${tema}"

JSON exato a retornar:
{
  "cover": {
    "tag": "categoria curta (1-2 palavras, lowercase)",
    "titulo": "título impactante lowercase, máx 8 palavras, ou pergunta provocativa",
    "subtitulo": "complemento direto lowercase, máx 12 palavras"
  },
  "slides": [
    {
      "numero": 2,
      "titulo": "ponto em lowercase, máx 7 palavras",
      "corpo": "explicação prática em 2-3 linhas curtas, lowercase",
      "destaque": "dado ou frase de impacto, ou null"
    }
  ],
  "cta": {
    "palavra": "${ctaKw}",
    "texto": "comenta ${ctaKw} aqui que eu te mando [o que será enviado — relacionado ao tema, lowercase]",
    "secundario": "salva esse post pra consultar quando precisar"
  },
  "hashtags": ["tag1","tag2","tag3","tag4","tag5"]
}

Crie exatamente ${numContent} objetos em "slides" (números de 2 até ${num - 1}).
O slide ${num} é o CTA — não inclua em "slides".
Hashtags: misture populares de engenharia com específicas de perícias (sem #).`;

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'content-type': 'application/json',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-haiku-4-5-20251001',
          max_tokens: 2048,
          system,
          messages: [{ role: 'user', content: prompt }]
        })
      });

      if (!res.ok) {
        const e = await res.json().catch(() => ({}));
        throw new Error(e.error?.message || `HTTP ${res.status}`);
      }

      const data = await res.json();
      let raw = data.content[0].text.trim();
      raw = raw.replace(/^```(?:json)?\n?/, '').replace(/\n?```$/, '').trim();

      const d = JSON.parse(raw);
      render(d, num);
      clearStatus();
      document.getElementById('exportBtns').style.display = 'flex';

      const hashBar = document.getElementById('hashBar');
      document.getElementById('hashText').textContent = d.hashtags.map(h => `#${h}`).join(' ');
      hashBar.classList.add('show');

    } catch (err) {
      setStatus(`erro: ${err.message}`, 'error');
      document.getElementById('emptyState').style.display = 'flex';
      document.getElementById('slidesWrapper').style.display = 'none';
    } finally {
      btn.disabled = false; btn.textContent = '→ gerar carrossel';
      document.getElementById('loader').classList.remove('show');
    }
  }

  /* ── render slides ── */
  function render(d, num) {
    const cont = document.getElementById('slidesCont');
    cont.innerHTML = '';

    const slides = [];
    slides.push(coverSlide(d.cover));
    d.slides.forEach((s, i) => slides.push(contentSlide(s, i + 2, num)));
    slides.push(ctaSlide(d.cta, d.hashtags));

    slides.forEach((el, i) => {
      if (i === 0) el.classList.add('active');
      cont.appendChild(el);
    });

    total = slides.length; cur = 0;
    buildDots();
    updateNav();
  }

  function coverSlide(c) {
    const el = document.createElement('div');
    el.className = 'slide slide-cover';
    el.innerHTML = `
      <div class="cover-bar"></div>
      <div class="s-brand">ePeritos</div>
      <div class="s-ghost" style="font-size:280px;bottom:-50px;left:-20px;opacity:.035;">e</div>
      <div class="cover-inner" style="position:relative;z-index:1;">
        <div class="cover-tag">${esc(c.tag)}</div>
        <div class="cover-title">${esc(c.titulo)}</div>
        <div class="cover-sub">${esc(c.subtitulo)}</div>
      </div>
      <div class="cover-handle">@eperitosaas</div>`;
    return el;
  }

  function contentSlide(s, num, total) {
    const el = document.createElement('div');
    el.className = 'slide slide-content';
    const pad = n => String(n).padStart(2, '0');
    const hl = s.destaque
      ? `<div class="content-highlight">${esc(s.destaque)}</div>` : '';
    el.innerHTML = `
      <div class="s-brand">ePeritos</div>
      <div class="s-ghost" style="font-size:220px;bottom:-30px;right:-10px;">${pad(num)}</div>
      <div style="position:relative;z-index:1;">
        <div class="content-counter">${pad(num)} / ${pad(total)}</div>
        <div class="content-title">${esc(s.titulo)}</div>
        <div class="content-body">${esc(s.corpo)}</div>
        ${hl}
      </div>`;
    return el;
  }

  function ctaSlide(cta, tags) {
    const el = document.createElement('div');
    el.className = 'slide slide-cta';
    const kw = cta.palavra || 'GUIA';
    const texto = esc(cta.texto).replace(kw, `<span class="kw">${kw}</span>`);
    const hashStr = tags ? tags.map(h => `#${h}`).join(' ') : '';
    el.innerHTML = `
      <div class="s-brand">ePeritos</div>
      <div class="s-ghost" style="font-size:180px;bottom:-20px;right:-10px;opacity:.05;">→</div>
      <div style="position:relative;z-index:1;">
        <div class="cta-tag">ação</div>
        <div class="cta-line"></div>
        <div class="cta-main">${texto}</div>
        <div class="cta-secondary">${esc(cta.secundario)}</div>
      </div>
      ${hashStr ? `<div class="slide-hashtags">${hashStr}</div>` : ''}`;
    return el;
  }

  function esc(str) {
    if (!str) return '';
    return String(str)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;')
      .replace(/\n/g,'<br>');
  }

  /* ── navigation ── */
  function buildDots() {
    const d = document.getElementById('dots');
    d.innerHTML = '';
    for (let i = 0; i < total; i++) {
      const dot = document.createElement('div');
      dot.className = 'dot' + (i === cur ? ' active' : '');
      dot.onclick = () => goTo(i);
      d.appendChild(dot);
    }
  }

  function updateNav() {
    document.getElementById('btnPrev').disabled = cur === 0;
    document.getElementById('btnNext').disabled = cur === total - 1;
    document.getElementById('slideCount').textContent = `${cur + 1} de ${total}`;
    document.querySelectorAll('.dot').forEach((d, i) =>
      d.className = 'dot' + (i === cur ? ' active' : ''));
  }

  function goTo(n) {
    document.querySelectorAll('.slide')[cur].classList.remove('active');
    cur = n;
    document.querySelectorAll('.slide')[cur].classList.add('active');
    updateNav();
  }

  function nav(dir) {
    const next = cur + dir;
    if (next >= 0 && next < total) goTo(next);
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft')  nav(-1);
    if (e.key === 'ArrowRight') nav(1);
  });

  /* ── export ── */
  async function capture(slide) {
    return html2canvas(slide, {
      scale: 2,
      useCORS: true,
      backgroundColor: '#2E2547',
      width: 540,
      height: 540,
      windowWidth: 540,
      windowHeight: 540
    });
  }

  async function dlSlide() {
    const slide = document.querySelectorAll('.slide')[cur];
    const canvas = await capture(slide);
    dl(canvas, `eperitosaas-slide-${String(cur + 1).padStart(2, '0')}.png`);
  }

  async function dlAll() {
    const btn = document.getElementById('btnDlAll');
    btn.disabled = true; btn.textContent = 'exportando...';
    const saved = cur;
    const slides = document.querySelectorAll('.slide');

    for (let i = 0; i < slides.length; i++) {
      goTo(i);
      await pause(120);
      const canvas = await capture(slides[i]);
      dl(canvas, `eperitosaas-slide-${String(i + 1).padStart(2, '0')}.png`);
      await pause(250);
    }

    goTo(saved);
    btn.disabled = false; btn.textContent = '↓ exportar todos';
  }

  function dl(canvas, name) {
    const a = document.createElement('a');
    a.download = name;
    a.href = canvas.toDataURL('image/png');
    a.click();
  }

  function pause(ms) { return new Promise(r => setTimeout(r, ms)); }

  function copyHash(btn) {
    const text = document.getElementById('hashText').textContent;
    navigator.clipboard.writeText(text).then(() => {
      btn.textContent = 'copiado!';
      setTimeout(() => btn.textContent = 'copiar', 2000);
    });
  }

  /* ── persist api key in sessionStorage ── */
  const stored = sessionStorage.getItem('ep_apikey');
  if (stored) document.getElementById('apiKey').value = stored;
  document.getElementById('apiKey').addEventListener('change', e => {
    sessionStorage.setItem('ep_apikey', e.target.value);
  });
</script>

</body>
</html>
